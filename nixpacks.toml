# Nixpacks build configuration for Railway
# ffmpeg from nixpkgs, yt-dlp installed via pip to always get latest version

[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "python312", "python312Packages.pip", "deno"]

[phases.install]
cmds = [
  "pip install --user -U yt-dlp curl-cffi bgutil-ytdlp-pot-provider --break-system-packages",
  "$HOME/.local/bin/yt-dlp --version",
  "$HOME/.local/bin/yt-dlp --rm-cache-dir || true",
  "npm ci --prefer-offline"
]

[phases.build]
cmds = [
  "npm run build",
  "cd server && npm ci --prefer-offline"
]

[start]
cmd = "node server/server.js"
