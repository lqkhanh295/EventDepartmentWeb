# Nixpacks build configuration for Railway
# ffmpeg from nixpkgs, yt-dlp installed via pip to always get latest version

[phases.setup]
nixPkgs = ["nodejs_20", "ffmpeg", "python312", "python312Packages.pip"]

[phases.install]
cmds = [
  "pip install -U yt-dlp",
  "npm ci --prefer-offline"
]

[phases.build]
cmds = [
  "npm run build",
  "cd server && npm ci --prefer-offline"
]

[start]
cmd = "node server/server.js"
